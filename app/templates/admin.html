<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f4f4f4;
    }
    a {
      display: inline-block;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <h1>Admin Dashboard</h1>
  <a href="/">Back to Intake Form</a>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Created</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>DOB</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Symptoms</th>
        <th>Preferred Date</th>
      </tr>
    </thead>
    <tbody>
      {% for row in submissions %}
      <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[8] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
        <td>{{ row[4] }}</td>
        <td>{{ row[5] }}</td>
        <td>{{ row[6] }}</td>
        <td>{{ row[7] }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
